version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nco-qdrant
    ports:
      - "6333:6333"   # REST/HTTP
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nco-backend
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    environment:
      - QDRANT_URL=http://qdrant:6333
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nco-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      # Next.js will call the backend via localhost from the user's browser
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    restart: unless-stopped
